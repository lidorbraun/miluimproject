<!DOCTYPE html>
<html lang="he">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/style.css" />
    <title>מילוי טופס</title>
  </head>
  <body>
    <nav>
      <ul>
        <li><a href="index.html">מילוי טופס</a></li>
        <li><a href="status.html">מעקב סטטוס</a></li>
        <li><a href="history.html">היסטוריית טפסים</a></li>
      </ul>
    </nav>

    <div class="container">
      <h1>מילוי טופס</h1>
      <h2>מלא את פרטי הטופס שלך כאן</h2>

      <form id="formSubmit" enctype="multipart/form-data">
        <label for="user_id">User ID:</label>
        <input
          type="number"
          id="user_id"
          name="user_id"
          placeholder="הכנס את מזהה המשתמש שלך"
          required
        />

        <label for="form_name">Form Name:</label>
        <input
          type="text"
          id="form_name"
          name="form_name"
          placeholder="הכנס את שם הטופס"
          required
        />

        <label for="description">Description:</label>
        <textarea
          id="description"
          name="description"
          placeholder="הכנס תיאור (אופציונלי)"
        ></textarea>

        <label for="file">Upload File:</label>
        <input type="file" id="file" name="file" />

        <button type="submit">שלח טופס</button>
      </form>
    </div>

    <script>
      document
        .getElementById("formSubmit")
        .addEventListener("submit", async (e) => {
          e.preventDefault();
          const formData = new FormData(e.target);

          const response = await fetch("/form/submit", {
            method: "POST",
            body: formData,
          });

          const result = await response.text();
          alert(result);
        });
    </script>
  </body>
</html>
